<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%VITE_APP_TITLE%</title>
  <style>
    .preload__wrap * {
      box-sizing: content-box !important;
      line-height: normal !important;
    }

    html,
    body,
    #app {
      height: 100%;
      background-color: #2c679f;
      position: relative;
    }

    * {
      padding: 0;
      margin: 0;
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
    }

    .preload__wrap {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      letter-spacing: 1px;
      transition: 0.3s linear;
      background-color: #2c679f;
    }

    .sea {
      z-index: 1000;
      width: 100%;
      height: 5%;
      background-color: #015871;
      position: absolute;
      left: 0;
      bottom: 0;
      opacity: 0.2;
    }

    @keyframes wave {
      0% {
        margin-left: 0;
      }

      100% {
        margin-left: -1600px;
      }
    }

    .wave {
      background: url(./sea_wave.svg) repeat-x;
      width: 6400px;
      height: 198px;
      position: absolute;
      top: -198px;
      animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
    }

    .wave:nth-child(2) {
      top: -175px;
      animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite,
        swell 7s ease infinite;
      animation-delay: -0.2s;
    }

    @keyframes swell {

      0%,
      100% {
        transform: translate(0, -25px);
      }

      50% {
        transform: translate(0, 5px);
      }
    }

    .preload__container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      align-items: center;
      justify-content: center;
      width: 100%;
      user-select: none;
    }

    .preload__name {
      margin-bottom: 30px;
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 5px;
    }

    .preload__title {
      margin: 30px 0 20px 0;
      font-size: 14px;
      color: #fff;
    }

    .preload__sub-title {
      font-size: 12px;
      color: #ababab;
    }

    .preload__footer {
      padding: 10px 0 20px 0;
      text-align: center;
    }

    .preload__footer a {
      font-size: 12px;
      color: #ababab;
      text-decoration: none;
    }

    .preload__loading {
      position: relative;
      width: 30px;
      height: 30px;
      border: 7px solid currentColor;
      border-bottom-color: #2f3447 !important;
      border-radius: 30px;
      transform: rotate(0deg);
      animation: r 1s infinite cubic-bezier(0.17, 0.67, 0.83, 0.67),
        bc 2s infinite ease-in;
    }

    @keyframes r {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .preload__loading::after,
    .preload__loading::before {
      position: absolute;
      bottom: -2px;
      display: inline-block;
      width: 7px;
      height: 7px;
      content: '';
      background-color: currentColor;
      border-radius: 10px;
    }

    .preload__loading::after {
      left: -1px;
    }

    .preload__loading::before {
      right: -1px;
    }

    @keyframes bc {
      0% {
        color: #689cc5;
      }

      25% {
        color: #b3b7e2;
      }

      50% {
        color: #93dbe9;
      }

      75% {
        color: #abbd81;
      }

      100% {
        color: #689cc5;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="fantastic-admin-home">
      <div class="preload__wrap">
        <div class="sea">
          <div class="wave"></div>
          <div class="wave"></div>
        </div>
        <div class="preload__container">
          <p class="preload__name">
            %VITE_APP_TITLE%
          </p>
          <div class="preload__loading"></div>
          <p class="preload__title">正在加载资源...</p>
        </div>
      </div>
    </div>
    <div id="browser-upgrade">
      <div class="title">为了您的体验，推荐使用以下浏览器</div>
      <div class="browsers">
        <a href="https://www.microsoft.com/edge" target="_blank" class="browser">
          <img class="browser-icon" src="/browser_upgrade/edge.png" />
          <div class="browser-name">Mircosoft Edge</div>
        </a>
        <a href="https://www.google.cn/chrome/" target="_blank" class="browser">
          <img class="browser-icon" src="/browser_upgrade/chrome.png" />
          <div class="browser-name">Google Chrome</div>
        </a>
      </div>
    </div>
  </div>
  <script>
    if (!!window.ActiveXObject || 'ActiveXObject' in window) {
      document.getElementById('browser-upgrade').style.display = 'block'
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
