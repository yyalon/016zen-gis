<!DOCTYPE html>
<html lang="zh-cmn-Hans">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="webkit" name="renderer" />
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
      name="viewport"
    />
    <link href="<%= BASE_URL %>favicon.ico" rel="icon" />
    <script type="text/javascript" src="./config/global.js"></script>
    <link
      href="./lib/mars3d-cesium/Widgets/widgets.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="./lib/mars3d-cesium/Cesium.js" type="text/javascript"></script>
    <title><%= VUE_APP_TITLE %></title>
    <meta
      content="Vue Admin Plus,Vue Admin Pro,Vab Admin Plus,Vab Admin Pro,vab官网,后台管理框架,vue后台管理框架"
      name="keywords"
    />
    <meta content="<%= VUE_APP_AUTHOR %>" name="author" />
    <link
      href="<%= BASE_URL %>static/css/loading.css?random=<%= VUE_APP_RANDOM %>"
      rel="stylesheet"
    />
    <style>
      .preload__wrap * {
        box-sizing: content-box !important;
        line-height: normal !important;
      }
      html,
      body,
      #app {
        height: 100%;
      }

      * {
        padding: 0;
        margin: 0;
        font-family: 'Helvetica Neue', Helvetica, 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
      }
      .preload__wrap {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        height: 100%;
        letter-spacing: 1px;
        background-color: #0077be;
      }

      .preload__container {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        align-items: center;
        justify-content: center;
        width: 100%;
        user-select: none;
      }

      .preload__name {
        margin-bottom: 30px;
        font-size: 30px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 5px;
      }

      .preload__title {
        margin: 30px 0 20px 0;
        font-size: 14px;
        color: #fff;
      }

      .preload__sub-title {
        font-size: 12px;
        color: #ababab;
      }

      .preload__footer {
        padding: 10px 0 20px 0;
        text-align: center;
      }

      .preload__footer a {
        font-size: 12px;
        color: #ababab;
        text-decoration: none;
      }

      .preload__loading {
        position: relative;
        width: 30px;
        height: 30px;
        border: 7px solid currentColor;
        border-bottom-color: #2f3447 !important;
        border-radius: 30px;
        transform: rotate(0deg);
        animation: r 1s infinite cubic-bezier(0.17, 0.67, 0.83, 0.67),
          bc 2s infinite ease-in;
      }

      @keyframes r {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      .preload__loading::after,
      .preload__loading::before {
        position: absolute;
        bottom: -2px;
        display: inline-block;
        width: 7px;
        height: 7px;
        content: '';
        background-color: currentColor;
        border-radius: 10px;
      }

      .preload__loading::after {
        left: -1px;
      }

      .preload__loading::before {
        right: -1px;
      }

      @keyframes bc {
        0% {
          color: #689cc5;
        }

        25% {
          color: #b3b7e2;
        }

        50% {
          color: #93dbe9;
        }

        75% {
          color: #abbd81;
        }

        100% {
          color: #689cc5;
        }
      }
    </style>
  </head>
  <body>
    <noscript></noscript>
    <div id="app">
      <div class="preload__wrap">
        <div class="preload__container">
          <p class="preload__name"><%= VUE_APP_TITLE %></p>
          <div class="preload__loading"></div>
          <p class="preload__title">正在加载资源...</p>
          <p class="preload__sub-title">
            初次加载资源可能需要较多时间 请耐心等待
          </p>
        </div>
      </div>
    </div>

          hm.src = 'https://hm.baidu.com/hm.js?085e0fa100dbc0e0e42931c16bf3e9e6'

          s.parentNode.insertBefore(hm, s)

  </body>
</html>
